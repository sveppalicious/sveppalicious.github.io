<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders of Birds</title>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f6f6f6;
      --text-primary: #1a1a1a;
      --text-muted: #555;
      --text-accent: #705dcf;
      --link-color: #705dcf;
      --link-hover: #5a45b5;
      --hr-color: #ddd;
      --callout-info-bg: rgba(8, 109, 221, 0.08);
      --callout-info-border: #086ddd;
      --callout-info-icon: #086ddd;
      --callout-tip-bg: rgba(8, 185, 78, 0.08);
      --callout-tip-border: #08b94e;
      --callout-tip-icon: #08b94e;
      --bold-color: #1a1a1a;
      --code-bg: #f3f3f3;
      --blockquote-border: #ddd;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Inter", sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      margin: 0;
      display: flex;
    }

    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      overflow-y: auto;
      background: var(--bg-secondary);
      border-right: 1px solid var(--hr-color);
      padding: 1.5rem 0;
      font-size: 0.85rem;
      z-index: 10;
    }

    #sidebar .toc-title {
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0 1rem 0.8rem;
      color: var(--text-primary);
      border-bottom: 1px solid var(--hr-color);
      margin-bottom: 0.5rem;
    }

    #sidebar a {
      display: block;
      padding: 0.25rem 1rem;
      color: var(--text-muted);
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }

    #sidebar a:hover {
      color: var(--text-primary);
      background: rgba(0,0,0,0.04);
    }

    #sidebar a.active {
      color: var(--link-color);
      border-left-color: var(--link-color);
      background: rgba(112, 93, 207, 0.06);
    }

    #sidebar a.toc-h1 { padding-left: 1rem; font-weight: 700; margin-top: 0.6rem; font-size: 0.95rem; }
    #sidebar a.toc-h2 { padding-left: 1.5rem; font-weight: 600; margin-top: 0.3rem; }
    #sidebar a.toc-h3 { padding-left: 2rem; }
    #sidebar a.toc-h4 { padding-left: 2.6rem; font-size: 0.82rem; }
    #sidebar a.toc-h5 { padding-left: 3.2rem; font-size: 0.8rem; }

    #sidebar-toggle {
      display: none;
      position: fixed;
      top: 0.8rem;
      left: 0.8rem;
      z-index: 20;
      background: var(--bg-secondary);
      border: 1px solid var(--hr-color);
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      cursor: pointer;
      font-size: 1.2rem;
      color: var(--text-primary);
    }

    .main-content {
      margin-left: 260px;
      padding: 2rem;
      max-width: 900px;
      width: calc(100% - 260px);
    }

    h1, h2, h3, h4, h5, h6 {
      color: var(--text-primary);
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 600;
    }

    h1 { font-size: 2.4em; border-bottom: 2px solid var(--hr-color); padding-bottom: 0.3em; }
    h2 { font-size: 1.9em; border-bottom: 1px solid var(--hr-color); padding-bottom: 0.3em; }
    h3 { font-size: 1.6em; }
    h4 { font-size: 1.35em; }
    h5 { font-size: 1.2em; }

    p {
      margin-bottom: 0.8em;
    }

    em {
      color: var(--text-muted);
    }

    strong {
      color: var(--bold-color);
    }

    a {
      color: var(--link-color);
      text-decoration: none;
    }

    a:hover {
      color: var(--link-hover);
      text-decoration: underline;
    }

    hr {
      border: none;
      border-top: 1px solid var(--hr-color);
      margin: 2em 0;
    }

    ul, ol {
      margin-bottom: 0.8em;
      padding-left: 1.8em;
    }

    li {
      margin-bottom: 0.3em;
    }

    img {
      max-width: 100%;
      border-radius: 6px;
      margin: 0.5em 0;
    }

    blockquote {
      border-left: 3px solid var(--blockquote-border);
      padding: 0.5em 1em;
      margin: 0.8em 0;
      color: var(--text-muted);
    }

    /* Obsidian-style callouts */
    .callout {
      border-radius: 6px;
      padding: 1em 1.2em;
      margin: 1em 0;
      border-left: 4px solid;
    }

    .callout-title {
      font-weight: 600;
      margin-bottom: 0.4em;
      display: flex;
      align-items: center;
      gap: 0.5em;
    }

    .callout-title svg {
      flex-shrink: 0;
    }

    .callout-content p:last-child {
      margin-bottom: 0;
    }

    .callout-info {
      background-color: var(--callout-info-bg);
      border-color: var(--callout-info-border);
    }

    .callout-info .callout-title {
      color: var(--callout-info-icon);
    }

    .callout-tip {
      background-color: var(--callout-tip-bg);
      border-color: var(--callout-tip-border);
    }

    .callout-tip .callout-title {
      color: var(--callout-tip-icon);
    }

    #content {
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Two images side-by-side when consecutive */
    .img-pair {
      display: flex;
      gap: 1em;
      margin: 0.5em 0;
    }

    .img-pair img {
      flex: 1;
      min-width: 0;
      object-fit: contain;
    }

    @media (max-width: 768px) {
      #sidebar {
        transform: translateX(-100%);
        transition: transform 0.25s ease;
      }

      #sidebar.open {
        transform: translateX(0);
      }

      #sidebar-toggle {
        display: block;
      }

      .main-content {
        margin-left: 0;
        width: 100%;
        padding: 1rem;
        padding-top: 3rem;
      }

      .img-pair {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <button id="sidebar-toggle" aria-label="Toggle navigation">&#9776;</button>
  <nav id="sidebar">
    <div class="toc-title">Table of Contents</div>
    <div id="toc"></div>
  </nav>
  <div class="main-content">
    <div id="content">Loading...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    function preprocessObsidian(md) {
      // Convert Obsidian image embeds: ![[filename]] -> ![](photos/filename)
      md = md.replace(/!\[\[([^\]]+\.(png|jpg|jpeg|gif|svg|webp))\]\]/gi, (match, filename) => {
        return `![](photos/${encodeURIComponent(filename)})`;
      });

      // Move images that precede a heading to after the heading
      md = md.replace(
        /((?:!\[[^\]]*\]\([^)]+\)\n)+)\n*(#{1,6}\s+[^\n]+)/g,
        '$2\n$1'
      );

      // Shift all headings up one level (## -> #, ### -> ##, etc.)
      md = md.replace(/^(#{2,6})\s/gm, (match, hashes) => {
        return '#'.repeat(hashes.length - 1) + ' ';
      });

      // Convert Obsidian callouts to custom HTML
      // Match callout blocks: > [!type] optional title\n> content lines
      const lines = md.split('\n');
      const result = [];
      let i = 0;

      while (i < lines.length) {
        const calloutMatch = lines[i].match(/^>\s*\[!(\w+)\]\s*(.*)?$/);
        if (calloutMatch) {
          const type = calloutMatch[1].toLowerCase();
          const customTitle = calloutMatch[2] || '';
          const title = customTitle || type.charAt(0).toUpperCase() + type.slice(1);

          // Collect callout content
          const contentLines = [];
          i++;
          while (i < lines.length && /^>\s?(.*)$/.test(lines[i])) {
            const contentMatch = lines[i].match(/^>\s?(.*)$/);
            contentLines.push(contentMatch[1]);
            i++;
          }

          const icon = type === 'info'
            ? '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
            : '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>';

          const content = contentLines.join('\n');

          result.push(`<div class="callout callout-${type}">`);
          result.push(`<div class="callout-title">${icon} ${title}</div>`);
          result.push(`<div class="callout-content">\n\n${content}\n\n</div>`);
          result.push(`</div>`);
          result.push('');
        } else {
          result.push(lines[i]);
          i++;
        }
      }

      return result.join('\n');
    }

    function pairConsecutiveImages(html) {
      // Find consecutive <p><img></p><p><img></p> and wrap them in .img-pair
      return html.replace(
        /(<p>\s*<img[^>]+>\s*<\/p>\s*)(<p>\s*<img[^>]+>\s*<\/p>)/g,
        '<div class="img-pair">$1$2</div>'
      );
    }

    async function render() {
      try {
        const response = await fetch('Orders.md');
        if (!response.ok) throw new Error('Failed to load Orders.md');
        let md = await response.text();

        md = preprocessObsidian(md);

        marked.setOptions({
          breaks: true,
          gfm: true,
        });

        let html = marked.parse(md);
        html = pairConsecutiveImages(html);

        document.getElementById('content').innerHTML = html;
        buildTOC();
        setupScrollSpy();
      } catch (err) {
        document.getElementById('content').innerHTML =
          `<p style="color: #ff6b6b;">Error loading content: ${err.message}</p>`;
      }
    }

    function buildTOC() {
      const headings = document.querySelectorAll('#content h1, #content h2, #content h3, #content h4, #content h5');
      const toc = document.getElementById('toc');
      const fragment = document.createDocumentFragment();

      headings.forEach((h, i) => {
        const id = 'section-' + i;
        h.id = id;

        const a = document.createElement('a');
        a.href = '#' + id;
        a.textContent = h.textContent;
        a.className = 'toc-' + h.tagName.toLowerCase();
        a.addEventListener('click', (e) => {
          e.preventDefault();
          h.scrollIntoView({ behavior: 'smooth' });
          // Close sidebar on mobile
          document.getElementById('sidebar').classList.remove('open');
        });
        fragment.appendChild(a);
      });

      toc.appendChild(fragment);
    }

    function setupScrollSpy() {
      const links = document.querySelectorAll('#toc a');
      const headings = document.querySelectorAll('#content h1, #content h2, #content h3, #content h4, #content h5');

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            links.forEach(l => l.classList.remove('active'));
            const active = document.querySelector(`#toc a[href="#${entry.target.id}"]`);
            if (active) active.classList.add('active');
          }
        });
      }, { rootMargin: '0px 0px -70% 0px' });

      headings.forEach(h => observer.observe(h));
    }

    // Mobile sidebar toggle
    document.getElementById('sidebar-toggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    render();
  </script>
</body>
</html>
